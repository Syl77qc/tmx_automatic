name: TMX v2 — Scanner z-scores
on:
  schedule:
    # Toutes les 5 minutes, lundi-vendredi, 13h25-21h05 UTC
    # = 9h25-17h05 HE (heures de marché TSX avec marge)
    - cron: "25,30,35,40,45,50,55 13 * * 1-5"
    - cron: "*/5 14-20 * * 1-5"
    - cron: "0,5 21 * * 1-5"
  workflow_dispatch:
    inputs:
      mode:
        description: "Mode d'exécution"
        required: false
        default: "live"
        type: choice
        options:
          - live
          - daily

jobs:
  scanner:
    name: Scan z-scores + Notifications + Dashboard
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4.2.2
        with:
          token: ${{ secrets.GH_PAT }}

      # ── 2. Python ────────────────────────────────────────────────────────────
      - name: Setup Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: "requirements.txt"

      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── 3. Scanner ───────────────────────────────────────────────────────────
      - name: Run scanner
        env:
          GMAIL_USER:               ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD:       ${{ secrets.GMAIL_APP_PASSWORD }}
          NOTIF_EMAIL_1:            ${{ secrets.NOTIF_EMAIL_1 }}
          NOTIF_EMAIL_2:            ${{ secrets.NOTIF_EMAIL_2 }}
          NOTIF_SMS_ROGERS:         ${{ secrets.NOTIF_SMS_ROGERS }}
          NOTIF_SMS_TELUS:          ${{ secrets.NOTIF_SMS_TELUS }}
          GROQ_API_KEY:             ${{ secrets.GROQ_API_KEY }}
          GH_PAT:                   ${{ secrets.GH_PAT }}
          GITHUB_REPOSITORY:        ${{ github.repository }}
        run: |
          MODE=${{ github.event.inputs.mode || 'live' }}
          python scanner.py --mode $MODE --output scan_results.json

      # ── 4. Dashboard ─────────────────────────────────────────────────────────
      - name: Generate dashboard
        run: python generate_dashboard.py

      # ── 5. Commit données JSON (à chaque run) ────────────────────────────────
      # scan_results.json, positions.json, trades_log.json : continuité paper trading mean reversion
      # contagion_pending.json : signaux de contagion en attente d'exécution J+1 (PRD v3.0 §5bis)
      # contagion_trades.json  : historique des trades de contagion fermés
      - name: Commit scan data
        run: |
          git config user.name  "FNBLab Bot"
          git config user.email "bot@fnblab.github.io"
          git add scan_results.json positions.json trades_log.json \
                  contagion_pending.json contagion_trades.json || true
          git diff --staged --quiet || git commit -m "Scan data $(date -u '+%Y-%m-%d %H:%M') UTC"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}

      # ── 6. Commit dashboard HTML (seulement si changement réel) ──────────────
      # index.html, resultats.html et contagion.html ne sont poussés QUE s'ils ont changé.
      # Sans cette séparation, chaque push déclenche un workflow
      # "pages build and deployment" qui fait throttler le schedule par GitHub.
      - name: Commit dashboard (signal changes only)
        run: |
          git add index.html resultats.html contagion.html || true
          if git diff --staged --quiet; then
            echo "Aucun changement dans le dashboard — push ignoré."
          else
            git commit -m "Dashboard update $(date -u '+%Y-%m-%d %H:%M') UTC"
            git push
            echo "Dashboard mis à jour et poussé."
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}

      # ── 7. Artifacts (toujours) ───────────────────────────────────────────────
      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4.6.2
        with:
          name: scan-results-${{ github.run_id }}
          path: |
            scan_results.json
            positions.json
            trades_log.json
            contagion_pending.json
            contagion_trades.json
          retention-days: 7
